<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Songs & Bible Quotes · Kelvin's Heart for Helen</title>
  <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400;700;900&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Playfair Display', 'Libre Baskerville', serif;
      background: linear-gradient(135deg, #FDF8F5 0%, #F9F0F5 50%, #F0EAF6 100%);
      min-height: 100vh;
      overflow-x: hidden;
      padding-top: 80px;
      padding-bottom: 2rem;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-15px); }
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateX(20px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    .floating-heart {
      position: fixed;
      pointer-events: none;
      color: rgba(201, 160, 181, 0.15);
      font-size: 20px;
      user-select: none;
      z-index: 0;
    }

    .container {
      max-width: 850px;
      margin: 0 auto;
      position: relative;
      z-index: 2;
      padding: 0 1rem;
    }

    /* Header Section */
    .quotes-header {
      text-align: center;
      margin-bottom: 2rem;
      animation: fadeIn 0.8s ease-out;
    }

    .quotes-header h1 {
      font-size: clamp(2rem, 6vw, 3rem);
      color: #5e3e52;
      font-weight: 700;
      font-family: 'Playfair Display', serif;
      margin-bottom: 0.5rem;
    }

    .quotes-header p {
      color: #9b7e92;
      font-family: 'Lato', sans-serif;
      font-size: 1rem;
      font-style: italic;
    }

    .heart-divider {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 1rem;
      margin: 1.5rem 0;
    }

    .heart-divider span {
      color: #c49aad;
      font-size: 1.2rem;
    }

    .heart-divider .line {
      width: 60px;
      height: 1px;
      background: linear-gradient(90deg, transparent, #c49aad, transparent);
    }

    /* Dropdown Selector */
    .selector-container {
      background: white;
      border-radius: 60px;
      padding: 0.5rem;
      margin-bottom: 2rem;
      box-shadow: 0 10px 30px rgba(107, 78, 113, 0.1);
      border: 1px solid rgba(196, 154, 173, 0.3);
    }

    .quote-selector {
      width: 100%;
      padding: 1rem 1.5rem;
      font-family: 'Lato', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      color: #5e3e52;
      background: linear-gradient(135deg, #FDF8F5 0%, #F9F0F5 100%);
      border: 1px solid rgba(196, 154, 173, 0.4);
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.3s ease;
      appearance: none;
      background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='16' height='16' viewBox='0 0 24 24' fill='none' stroke='%23c49aad' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><polyline points='6 9 12 15 18 9'></polyline></svg>");
      background-repeat: no-repeat;
      background-position: right 1.5rem center;
    }

    .quote-selector:hover {
      border-color: #c49aad;
      box-shadow: 0 4px 15px rgba(196, 154, 173, 0.2);
    }

    .quote-selector:focus {
      outline: none;
      border-color: #c49aad;
      box-shadow: 0 0 0 3px rgba(196, 154, 173, 0.2);
    }

    /* Quote Card */
    .quote-card {
      background: white;
      border-radius: 24px;
      padding: 2rem;
      box-shadow: 0 20px 40px rgba(107, 78, 113, 0.1);
      border: 1px solid rgba(196, 154, 173, 0.3);
      animation: fadeIn 0.5s ease-out;
      transition: all 0.3s ease;
    }

    .quote-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 25px 45px rgba(107, 78, 113, 0.15);
    }

    .quote-icon {
      text-align: center;
      font-size: 2.5rem;
      color: #c49aad;
      margin-bottom: 1rem;
      opacity: 0.6;
    }

    .quote-text {
      font-family: 'Playfair Display', serif;
      font-size: 1.2rem;
      line-height: 1.9;
      color: #3a2a3a;
      text-align: center;
      font-style: italic;
      margin-bottom: 1.8rem;
      padding: 0 0.5rem;
      font-weight: 500;
    }

    .quote-author {
      text-align: center;
      font-family: 'Lato', sans-serif;
      font-size: 1rem;
      color: #c49aad;
      font-weight: 700;
      letter-spacing: 1px;
      border-top: 1px solid #f0e0e8;
      padding-top: 1rem;
      display: inline-block;
      width: auto;
      margin: 0 auto;
    }

    .author-container {
      text-align: center;
    }

    .reference {
      font-size: 0.85rem;
      color: #9b7e92;
      font-family: 'Lato', sans-serif;
      margin-top: 0.4rem;
    }

    /* Navigation Buttons */
    .nav-buttons {
      display: flex;
      justify-content: center;
      gap: 1.5rem;
      margin-top: 1.5rem;
      margin-bottom: 1rem;
    }

    .nav-btn {
      background: linear-gradient(135deg, #d4b5c4 0%, #c49aad 100%);
      color: white;
      border: none;
      border-radius: 60px;
      padding: 0.8rem 2rem;
      font-size: 0.95rem;
      font-family: 'Lato', sans-serif;
      font-weight: 700;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      transition: all 0.3s ease;
      box-shadow: 0 4px 12px rgba(196, 154, 173, 0.3);
    }

    .nav-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 18px rgba(196, 154, 173, 0.4);
    }

    .nav-btn:active {
      transform: translateY(0);
    }

    .nav-btn-prev {
      background: rgba(255, 255, 255, 0.92);
      color: #7a5f71;
      border: 1.5px solid rgba(196, 154, 173, 0.4);
      background: white;
    }

    .nav-btn-prev:hover {
      background: #fef8fa;
      border-color: #c49aad;
    }

    /* Decorative elements */
    .vintage-border {
      background: repeating-linear-gradient(45deg, rgba(196,154,173,0.05) 0px, rgba(196,154,173,0.05) 2px, transparent 2px, transparent 8px);
      border-radius: 24px;
      padding: 1px;
    }

    .category-badge {
      display: inline-block;
      background: linear-gradient(135deg, #c49aad20 0%, #d4b5c430 100%);
      color: #7a5f71;
      font-family: 'Lato', sans-serif;
      font-size: 0.7rem;
      padding: 0.3rem 1rem;
      border-radius: 30px;
      margin-bottom: 1rem;
      letter-spacing: 1px;
    }

    /* Counter */
    .quote-counter {
      text-align: center;
      margin-top: 1.5rem;
      font-family: 'Lato', sans-serif;
      font-size: 0.75rem;
      color: #b28aa0;
      letter-spacing: 1px;
    }

    @media (max-width: 600px) {
      .quote-card {
        padding: 1.5rem;
      }
      .selector-container {
        padding: 0.3rem;
      }
      .quote-selector {
        padding: 0.8rem 1.2rem;
        font-size: 0.9rem;
      }
      .quote-text {
        font-size: 1rem;
        line-height: 1.7;
      }
      .nav-btn {
        padding: 0.6rem 1.2rem;
        font-size: 0.85rem;
      }
      .nav-buttons {
        gap: 1rem;
      }
    }
  </style>
</head>
<body>

<!-- Navbar -->
<nav class="bg-white/95 backdrop-blur-sm fixed w-full z-20 top-0 start-0 border-b border-gray-200 shadow-sm">
  <div class="max-w-screen-xl flex flex-wrap items-center justify-between mx-auto p-4">
    <a href="home.html" class="flex items-center space-x-3 rtl:space-x-reverse">
      <svg class="h-8 w-8 text-[#c49aad]" fill="currentColor" viewBox="0 0 24 24">
        <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
      </svg>
      <span class="self-center text-xl font-semibold whitespace-nowrap text-[#5e3e52]">Kelvin's Heart</span>
    </a>
    <div class="flex items-center md:order-2 space-x-1 md:space-x-0 rtl:space-x-reverse">
      <button id="languageDropdownBtn" type="button" class="flex items-center text-[#5e3e52] bg-transparent border border-[#c49aad]/30 hover:bg-[#f9f0f5] focus:ring-4 focus:ring-[#c49aad]/20 font-medium rounded-lg text-sm px-3 py-2 focus:outline-none transition-all">
        <svg class="h-4 w-4 me-1.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"/>
          <line x1="2" y1="12" x2="22" y2="12"/>
          <path d="M12 2a15 15 0 0 0 0 20 15 15 0 0 0 0-20z"/>
        </svg>
        <span id="currentLanguageLabel">English</span>
      </button>
      <div class="z-50 hidden bg-white border border-gray-200 rounded-lg shadow-lg w-44" id="languageDropdownMenu">
        <ul class="p-2 text-sm text-gray-700 font-medium" role="none">
          <li><a href="#" data-lang="en" class="lang-option inline-flex items-center w-full p-2 hover:bg-[#f9f0f5] hover:text-[#c49aad] rounded">🇬🇧 English</a></li>
          <li><a href="#" data-lang="sw" class="lang-option inline-flex items-center w-full p-2 hover:bg-[#f9f0f5] hover:text-[#c49aad] rounded">🇹🇿 Kiswahili</a></li>
          <li><a href="#" data-lang="ki" class="lang-option inline-flex items-center w-full p-2 hover:bg-[#f9f0f5] hover:text-[#c49aad] rounded">🌾 Gĩkũyũ</a></li>
          <li><a href="#" data-lang="fr" class="lang-option inline-flex items-center w-full p-2 hover:bg-[#f9f0f5] hover:text-[#c49aad] rounded">🇫🇷 Français</a></li>
        </ul>
      </div>
      <button id="navbarToggle" type="button" class="inline-flex items-center p-2 w-10 h-10 justify-center text-sm text-gray-500 rounded-lg md:hidden hover:bg-gray-100 focus:outline-none focus:ring-2 focus:ring-gray-200">
        <span class="sr-only">Open main menu</span>
        <svg class="w-6 h-6" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24"><path stroke="currentColor" stroke-linecap="round" stroke-width="2" d="M5 7h14M5 12h14M5 17h14"/></svg>
      </button>
    </div>
    <div class="items-center justify-between hidden w-full md:flex md:w-auto md:order-1" id="navbarMenu">
      <ul class="font-medium flex flex-col p-4 md:p-0 mt-4 border border-gray-100 rounded-lg bg-gray-50 md:flex-row md:space-x-8 rtl:space-x-reverse md:mt-0 md:border-0 md:bg-transparent">
        <li><a href="index.html" class="nav-link block py-2 px-3 rounded md:p-0 text-gray-900 hover:text-[#c49aad] transition-colors" data-page="home">Home</a></li>
        <li><a href="prescriptions.html" class="nav-link block py-2 px-3 rounded md:p-0 text-gray-900 hover:text-[#c49aad] transition-colors" data-page="prescriptions">Prescriptions</a></li>
        <li><a href="letters.html" class="nav-link block py-2 px-3 rounded md:p-0 text-gray-900 hover:text-[#c49aad] transition-colors" data-page="letters">Letters</a></li>
        <li><a href="songs.html" class="nav-link block py-2 px-3 rounded md:p-0 text-[#c49aad] font-semibold transition-colors" data-page="songs">Songs & Quotes</a></li>
      </ul>
    </div>
  </div>
</nav> <br>

<div class="container">
  <div class="quotes-header">
    <h1>✧ Words from the Heart ✧</h1>
    <p>Sacred scriptures & timeless melodies that speak our love</p>
    <div class="heart-divider">
      <span class="line"></span>
      <span>♥</span>
      <span class="line"></span>
    </div>
  </div>

  <div class="selector-container">
    <select id="quoteSelector" class="quote-selector">
      <option value="bible">📖 Holy Bible · Love Scriptures (10 verses)</option>
      <option value="songs">🎵 Timeless Love Songs (10 songs)</option>
    </select>
  </div>

  <div id="quoteDisplay" class="vintage-border">
    <!-- Quotes will appear here dynamically -->
  </div>

  <!-- Navigation Buttons -->
  <div class="nav-buttons">
    <button id="prevBtn" class="nav-btn nav-btn-prev">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="15 18 9 12 15 6"></polyline>
      </svg>
      Previous
    </button>
    <button id="nextBtn" class="nav-btn">
      Next
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="9 18 15 12 9 6"></polyline>
      </svg>
    </button>
  </div>
</div>

<script>
  // BIBLE LOVE QUOTES - 10 verses
  const bibleQuotes = [
    {
      text: "Love is patient, love is kind. It does not envy, it does not boast, it is not proud. It does not dishonor others, it is not self-seeking, it is not easily angered, it keeps no record of wrongs.",
      reference: "1 Corinthians 13:4-5",
      book: "Corinthians"
    },
    {
      text: "I have found the one whom my soul loves. I held him and would not let him go.",
      reference: "Song of Solomon 3:4",
      book: "Song of Solomon"
    },
    {
      text: "Place me like a seal over your heart, like a seal on your arm; for love is as strong as death, its jealousy unyielding as the grave. It burns like blazing fire, like a mighty flame.",
      reference: "Song of Solomon 8:6",
      book: "Song of Solomon"
    },
    {
      text: "Above all, love each other deeply, because love covers over a multitude of sins.",
      reference: "1 Peter 4:8",
      book: "Peter"
    },
    {
      text: "Let love and faithfulness never leave you; bind them around your neck, write them on the tablet of your heart. Then you will win favor and a good name in the sight of God and man.",
      reference: "Proverbs 3:3-4",
      book: "Proverbs"
    },
    {
      text: "There is no fear in love. But perfect love drives out fear, because fear has to do with punishment. The one who fears is not made perfect in love.",
      reference: "1 John 4:18",
      book: "John"
    },
    {
      text: "We love because He first loved us.",
      reference: "1 John 4:19",
      book: "John"
    },
    {
      text: "Many waters cannot quench love; rivers cannot sweep it away. If one were to give all the wealth of one's house for love, it would be utterly scorned.",
      reference: "Song of Solomon 8:7",
      book: "Song of Solomon"
    },
    {
      text: "Be completely humble and gentle; be patient, bearing with one another in love. Make every effort to keep the unity of the Spirit through the bond of peace.",
      reference: "Ephesians 4:2-3",
      book: "Ephesians"
    },
    {
      text: "And over all these virtues put on love, which binds them all together in perfect unity. Let the peace of Christ rule in your hearts.",
      reference: "Colossians 3:14-15",
      book: "Colossians"
    }
  ];

  // SONG LOVE QUOTES - 10 songs
  const songQuotes = [
    {
      text: "Truly, I love you. Truly, I do. I've been waiting for a girl like you to come into my life. Truly, I love you. Truly, I do....",
      artist: "Lionel Richie",
      song: "Truly",
      year: "1982"
    },
    {
      text: "When i am with you, ni ukweli tu, i will do anything for love....",
      artist: "Ywaya Tajiri",
      song: "Chai ya Saa Kumi",
      year: "2026"
    },
    {
      text: "I won,t change, my love for you will forever remain to be the same...",
      artist: "Kinoti",
      song: "Nitangoja",
      year: "2025"
    },
    {
      text: "I was looking for attention, then i ran into perfection, it was never my intention to fall in love again...",
      artist: "Mutoriah",
      song: "For lovers",
      year: "2025"
    },
    {
      text: "You are such a blessing, you give me so much light, the type that keeps on giving, i knew i cant deny...",
      artist: "Kinoti",
      song: "Like you",
      year: "2024"
    },
    {
      text: "My days are long, my nights so cold but bado mimi nakupenda...",
      artist: "Sauti sol",
      song: "Coming home",
      year: "2010"
    },
    {
      text: "Unawasha moto ata bila kua na kibiriti, we hufanya nini ndio ukange tu fity hivi??, mpaka moyo wangu unasimama...",
      artist: "Watendawili",
      song: "For real",
      year: "2025"
    },
    {
      text: "Napenda kupendwa na wwe, sioni cha kufananisha, kama kupendwa na wwe...",
      artist: "Watendawili",
      song: "Kupendwa na wewe",
      year: "2024"
    },
    {
      text: "Hey love, i think im ready now, i have been so patient, anticipating, but you came along...",
      artist: "Bien",
      song: "Chikwere",
      year: "2025"
    },
    {
      text: "Sura yako mzuri mama, Tabasamu lako ni maua...",
      artist: "Sauti sol",
      song: "Sura yako",
      year: "2010"
    }
  ];

  let currentCategory = 'bible';
  let currentIndex = 0;

  function displayQuote(index) {
    const displayDiv = document.getElementById('quoteDisplay');
    const quotes = currentCategory === 'bible' ? bibleQuotes : songQuotes;
    
    // Ensure index is within bounds
    if (index < 0) index = quotes.length - 1;
    if (index >= quotes.length) index = 0;
    currentIndex = index;
    
    const quote = quotes[currentIndex];

    if (currentCategory === 'bible') {
      displayDiv.innerHTML = `
        <div class="quote-card">
          <div class="quote-icon">✧ 📖 ✧</div>
          <div style="text-align: center;">
            <span class="category-badge">Holy Scripture</span>
          </div>
          <div class="quote-text" style="font-style: normal;">"${quote.text}"</div>
          <div class="author-container">
            <div class="quote-author">${quote.book}</div>
            <div class="reference">📜 ${quote.reference}</div>
          </div>
          <div class="quote-counter">
            ✧ ${currentIndex + 1} of ${quotes.length} ✧
          </div>
        </div>
      `;
    } else {
      displayDiv.innerHTML = `
        <div class="quote-card">
  <div class="quote-icon">♪ 🎵 ♪</div>
  <div style="text-align: center;">
    <span class="category-badge">Timeless Melody</span>
  </div>
  <div class="quote-text" style="font-style: normal;">"${quote.text}"</div>
  <div class="author-container">
    <div class="quote-author">${quote.artist}</div>
    <div class="reference">🎤 “${quote.song}” · ${quote.year}</div>
  </div>
  <div class="quote-counter">
    ✧ ${currentIndex + 1} of ${quotes.length} ✧
  </div>
</div>
      `;
    }
  }

  function nextQuote() {
    const quotes = currentCategory === 'bible' ? bibleQuotes : songQuotes;
    currentIndex = (currentIndex + 1) % quotes.length;
    displayQuote(currentIndex);
  }

  function prevQuote() {
    const quotes = currentCategory === 'bible' ? bibleQuotes : songQuotes;
    currentIndex = (currentIndex - 1 + quotes.length) % quotes.length;
    displayQuote(currentIndex);
  }

  function changeCategory(category) {
    currentCategory = category;
    currentIndex = 0;
    displayQuote(0);
  }

  // Event Listeners
  document.getElementById('nextBtn').addEventListener('click', nextQuote);
  document.getElementById('prevBtn').addEventListener('click', prevQuote);
  
  const selector = document.getElementById('quoteSelector');
  selector.addEventListener('change', (e) => {
    changeCategory(e.target.value);
  });

  // Floating hearts
  function createFloatingHearts() {
    const existing = document.querySelectorAll('.floating-heart');
    existing.forEach(el => el.remove());
    for (let i = 0; i < 24; i++) {
      const heart = document.createElement('div');
      heart.className = 'floating-heart';
      heart.innerHTML = '♥';
      heart.style.left = Math.random() * 100 + '%';
      heart.style.top = Math.random() * 100 + '%';
      heart.style.fontSize = (12 + Math.random() * 24) + 'px';
      heart.style.opacity = 0.1 + Math.random() * 0.12;
      heart.style.animation = `float ${4 + Math.random() * 6}s ease-in-out infinite`;
      heart.style.animationDelay = Math.random() * 3 + 's';
      document.body.appendChild(heart);
    }
  }

  // Initialize
  displayQuote(0);
  createFloatingHearts();
  window.addEventListener('resize', () => createFloatingHearts());

  // Language dropdown
  document.getElementById('navbarToggle')?.addEventListener('click', () => {
    document.getElementById('navbarMenu')?.classList.toggle('hidden');
  });

  const dropdownBtn = document.getElementById('languageDropdownBtn');
  const dropdownMenu = document.getElementById('languageDropdownMenu');
  if (dropdownBtn) {
    dropdownBtn.addEventListener('click', () => dropdownMenu.classList.toggle('hidden'));
  }
  document.addEventListener('click', (e) => {
    if (!dropdownBtn?.contains(e.target) && !dropdownMenu?.contains(e.target)) {
      dropdownMenu?.classList.add('hidden');
    }
  });

  // Navbar navigation
  document.querySelectorAll('.nav-link').forEach(link => {
    link.addEventListener('click', (e) => {
      const page = link.getAttribute('data-page');
      if (page === 'songs') {
        return;
      } else if (page === 'home') {
        window.location.href = 'home.html';
      } else if (page === 'prescriptions') {
        window.location.href = 'index.html';
      } else if (page === 'letters') {
        window.location.href = 'letters.html';
      }
    });
  });
</script>
</body>
</html>
