<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Prescription for Helen · Kelvin's Heart</title>
  <!-- Google Fonts: Libre Baskerville + Lato (matching the React component) -->
  <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400;700;900&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    /* Global style - same gradient, delicate pharmacy touch */
    body {
      font-family: 'Libre Baskerville', serif;
      background: linear-gradient(135deg, #F5E6E8 0%, #E8D5E0 50%, #D4E4F0 100%);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* fade-in keyframes */
    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes float {
      0%, 100% {
        transform: translateY(0px);
      }
      50% {
        transform: translateY(-15px);
      }
    }

    @keyframes heartbeat {
      0%, 100% {
        transform: scale(1);
      }
      50% {
        transform: scale(1.1);
      }
    }

    /* utility */
    .container {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      position: relative;
    }

    /* floating hearts background (pure CSS, no extra DOM bloat) */
    .floating-heart {
      position: absolute;
      pointer-events: none;
      color: rgba(201, 160, 181, 0.2);
      font-size: 20px;
      user-select: none;
      z-index: 0;
    }

    /* main card + animations */
    .landing-card, .prescription-wrapper {
      max-width: 700px;
      width: 100%;
      position: relative;
      z-index: 2;
      animation: fadeIn 1.2s ease-out;
    }

    .landing-inner {
      text-align: center;
    }

    .heart-beat-icon {
      margin: 0 auto 2rem;
      animation: heartbeat 2s ease-in-out infinite;
      display: inline-block;
    }

    .btn-gradient {
      background: linear-gradient(135deg, #C9A0B5 0%, #B88FA4 100%);
      color: white;
      border: none;
      border-radius: 50px;
      padding: 1rem 2.5rem;
      font-size: 1.1rem;
      font-family: 'Lato', sans-serif;
      font-weight: 700;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 0.7rem;
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(201, 160, 181, 0.4);
    }

    .btn-gradient:hover {
      transform: translateY(-3px);
      box-shadow: 0 6px 25px rgba(201, 160, 181, 0.5);
    }

    .btn-outline-nav {
      background: rgba(255, 255, 255, 0.9);
      color: #6B4E71;
      border: 2px solid rgba(201, 160, 181, 0.3);
      border-radius: 50px;
      padding: 0.8rem 1.5rem;
      font-size: 1rem;
      font-family: 'Lato', sans-serif;
      font-weight: 700;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      transition: all 0.3s ease;
      backdrop-filter: blur(10px);
    }

    .btn-outline-nav:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 15px rgba(201, 160, 181, 0.3);
    }

    /* prescription card style */
    .prescription-card {
      background: white;
      border-radius: 12px;
      padding: clamp(2rem, 5vw, 3rem);
      box-shadow: 0 15px 50px rgba(0, 0, 0, 0.1);
      border: 2px solid #E8D5E0;
      width: 100%;
    }

    .rx-symbol-header {
      border-bottom: 2px solid #E8D5E0;
      padding-bottom: 1.5rem;
      margin-bottom: 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .rx-big {
      font-size: 3rem;
      color: #C9A0B5;
      font-weight: 700;
      line-height: 1;
    }

    .clinic-info {
      text-align: right;
      font-family: 'Lato', sans-serif;
      font-size: 0.85rem;
      color: #8B7092;
    }

    .patient-info {
      font-family: 'Lato', sans-serif;
      font-size: 0.9rem;
      color: #6B4E71;
      margin-bottom: 2rem;
      line-height: 1.8;
    }

    .diagnosis-box {
      background: linear-gradient(135deg, #F9F4F6 0%, #F5EEF4 100%);
      border-radius: 10px;
      padding: 1.5rem;
      margin-bottom: 2rem;
      border: 1px solid #E8D5E0;
    }

    .diagnosis-label, .prescribed-label {
      font-family: 'Lato', sans-serif;
      font-size: 0.85rem;
      color: #8B7092;
      font-weight: 700;
      letter-spacing: 0.05em;
      margin-bottom: 0.5rem;
    }

    .diagnosis-text, .prescribed-text {
      font-family: 'Lato', sans-serif;
      font-size: 1rem;
      color: #6B4E71;
      font-style: italic;
    }

    .signature-area {
      border-top: 2px solid #E8D5E0;
      padding-top: 1.5rem;
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      font-family: 'Lato', sans-serif;
      font-size: 0.9rem;
      color: #8B7092;
    }

    .signature-name {
      font-family: 'Libre Baskerville', serif;
      font-style: italic;
      font-size: 1.3rem;
      color: #6B4E71;
    }

    /* final message card */
    .final-message {
      background: rgba(255, 255, 255, 0.9);
      border-radius: 12px;
      padding: 2rem;
      margin-top: 2rem;
      text-align: center;
      box-shadow: 0 10px 30px rgba(201, 160, 181, 0.2);
      border: 2px solid rgba(201, 160, 181, 0.3);
      animation: fadeIn 0.8s ease-out 0.3s both;
    }

    /* navigation buttons row */
    .nav-row {
      display: flex;
      justify-content: space-between;
      margin-top: 2rem;
      gap: 1rem;
    }

    /* home absolute button */
    .home-abs-btn {
      position: absolute;
      top: -60px;
      left: 0;
      background: rgba(255, 255, 255, 0.7);
      border: 2px solid rgba(201, 160, 181, 0.3);
      border-radius: 50%;
      width: 45px;
      height: 45px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.3s ease;
      backdrop-filter: blur(10px);
    }

    .home-abs-btn:hover {
      background: rgba(255, 255, 255, 0.95);
      transform: scale(1.1);
    }

    /* responsive */
    @media (max-width: 600px) {
      .container {
        padding: 1.5rem;
      }
      .nav-row {
        flex-direction: column;
      }
      .nav-row button {
        justify-content: center;
      }
      .home-abs-btn {
        top: -50px;
        left: 10px;
      }
    }
  </style>
</head>
<body>

<div id="root"></div>

<script>
  // ------------------------------
  //  PRESCRIPTION DATA (exactly from React component)
  // ------------------------------
  const prescriptions = [
    {
      title: "The First Glance",
      content: "When I first saw you, I never thought we would be here... or rather, that I would be here. You were just the pharmacist, and I was just the cashier. But something about you made me look twice.",
      diagnosis: "Unexpected butterflies",
      prescribed: "A second look, a third, and every glance after"
    },
    {
      title: "A Bright Future",
      content: "Slowly by slowly, I'm starting to see a future with you. Not just any future, Helen, but a bright one. One where we wake up together, build together, laugh together.",
      diagnosis: "Hope blooming in my heart",
      prescribed: "Dreams of tomorrow with you in every one"
    },
    {
      title: "Getting to Know You",
      content: "Getting to know you first was one good move. The more I learned about who you are, the more certain I became. You are a good figure to be the mother of our little kids. You have that warmth, that care, that gentle strength.",
      diagnosis: "Certainty beyond doubt",
      prescribed: "A lifetime of getting to know you deeper"
    },
    {
      title: "The Woman I Choose",
      content: "You are the woman I want to spend time and life with. The woman I want to see walking the aisle towards me. The woman I want to make money with and spend it with. The woman I choose, every single day.",
      diagnosis: "Complete devotion",
      prescribed: "Forever choosing you, again and again"
    },
    {
      title: "Everything About You",
      content: "Your smile just makes me happy because of how pretty it is. Your eyes (though you call them big eyes, and I call them beautiful). You as a person... Helen, everything about you. That's what I fell for. All of you.",
      diagnosis: "Hopelessly in love",
      prescribed: "More time with you, more smiles, more everything"
    }
  ];

  // helper to create floating hearts (same romantic scattered effect)
  function createFloatingHearts(container) {
    // Remove existing if any
    const existing = document.querySelectorAll('.floating-heart');
    existing.forEach(el => el.remove());
    const heartCount = 16;
    for (let i = 0; i < heartCount; i++) {
      const heartSpan = document.createElement('div');
      heartSpan.className = 'floating-heart';
      heartSpan.innerHTML = '♥';
      const leftPos = Math.random() * 90;
      const topPos = Math.random() * 90;
      const duration = 3 + Math.random() * 5;
      const delay = Math.random() * 3;
      const size = 12 + Math.random() * 20;
      heartSpan.style.left = leftPos + '%';
      heartSpan.style.top = topPos + '%';
      heartSpan.style.fontSize = size + 'px';
      heartSpan.style.opacity = 0.12 + Math.random() * 0.12;
      heartSpan.style.animation = `float ${duration}s ease-in-out infinite`;
      heartSpan.style.animationDelay = `${delay}s`;
      container.appendChild(heartSpan);
    }
  }

  // state management
  let currentPage = 0;   // 0 = landing, 1..5 = prescriptions

  function render() {
    const rootEl = document.getElementById('root');
    if (!rootEl) return;

    // full container style
    rootEl.innerHTML = '';
    const mainContainer = document.createElement('div');
    mainContainer.className = 'container';
    // attach floating hearts (each render refreshes, keep romantic)
    createFloatingHearts(mainContainer);

    // ----- LANDING PAGE (currentPage === 0) -----
    if (currentPage === 0) {
      const landingWrapper = document.createElement('div');
      landingWrapper.className = 'landing-card';
      landingWrapper.innerHTML = `
        <div class="landing-inner">
          <div class="heart-beat-icon">
            <svg xmlns="http://www.w3.org/2000/svg" width="50" height="50" viewBox="0 0 24 24" fill="#C9A0B5" stroke="none">
              <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
            </svg>
          </div>
          <h1 style="font-size: clamp(2.5rem, 6vw, 4rem); color: #6B4E71; margin-bottom: 1rem; font-weight: 700; line-height: 1.1; letter-spacing: -0.01em;">Welcome To,<br />This world</h1>
          <p style="font-size: clamp(1.2rem, 2.5vw, 1.5rem); color: #8B7092; margin-bottom: 2.5rem; font-family: 'Lato', sans-serif; font-weight: 300; line-height: 1.6; font-style: italic;">A prescription written by someone<br />who fell in love with the pharmacist</p>
          <div style="background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(10px); border-radius: 20px; padding: 2.5rem 2rem; box-shadow: 0 10px 40px rgba(107, 78, 113, 0.15); border: 3px solid rgba(201, 160, 181, 0.3); margin-bottom: 2rem;">
            <p style="font-size: 1.1rem; color: #5D4E6B; font-family: 'Lato', sans-serif; line-height: 1.8; margin-bottom: 2rem;">I've written you five prescriptions, Helen.<br />Not for medicine, but for my heart.<br />Each one tells you a piece of how I fell for you.</p>
            <button id="startReadingBtn" class="btn-gradient">Read My Heart <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg></button>
          </div>
          <p style="font-size: 0.9rem; color: #A08FA8; font-family: 'Lato', sans-serif; font-style: italic;">From: Kelvin, the cashier who can't stop thinking about you 💜</p>
        </div>
      `;
      mainContainer.appendChild(landingWrapper);
      rootEl.appendChild(mainContainer);

      const startBtn = document.getElementById('startReadingBtn');
      if (startBtn) {
        startBtn.addEventListener('click', () => {
          currentPage = 1;
          render();
        });
      }
      return;
    }

    // ---------- PRESCRIPTION PAGES (currentPage 1..5) --------------
    const prescriptionIndex = currentPage - 1; // 0-based for array
    const prescription = prescriptions[prescriptionIndex];
    const isLastPage = (currentPage === prescriptions.length);

    // create wrapper with relative position for home button
    const wrapperDiv = document.createElement('div');
    wrapperDiv.style.position = 'relative';
    wrapperDiv.style.width = '100%';
    wrapperDiv.style.maxWidth = '700px';
    wrapperDiv.style.margin = '0 auto';

    // home button (absolute)
    const homeBtn = document.createElement('button');
    homeBtn.className = 'home-abs-btn';
    homeBtn.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#6B4E71" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2h-5v-8H7v8H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>`;
    homeBtn.addEventListener('click', () => {
      currentPage = 0;
      render();
    });
    wrapperDiv.appendChild(homeBtn);

    // prescription card container
    const prescriptionRoot = document.createElement('div');
    prescriptionRoot.className = 'prescription-wrapper';

    // prescription number indicator
    const stepDiv = document.createElement('div');
    stepDiv.style.textAlign = 'center';
    stepDiv.style.marginBottom = '1.5rem';
    stepDiv.style.fontFamily = "'Lato', sans-serif";
    stepDiv.style.fontSize = '0.9rem';
    stepDiv.style.color = '#8B7092';
    stepDiv.style.fontWeight = '600';
    stepDiv.style.letterSpacing = '0.1em';
    stepDiv.innerText = `PRESCRIPTION ${currentPage} OF ${prescriptions.length}`;
    prescriptionRoot.appendChild(stepDiv);

    // main card
    const card = document.createElement('div');
    card.className = 'prescription-card';
    card.innerHTML = `
      <div class="rx-symbol-header">
        <div class="rx-big">℞</div>
        <div class="clinic-info">
          <div>Dr. Kelvin's Heart Clinic</div>
          <div style="font-style: italic; margin-top: 0.3rem;">Specializing in Falling in Love</div>
        </div>
      </div>
      <div class="patient-info">
        <div><strong>Patient:</strong> Helen (The Pharmacist)</div>
        <div><strong>Prescribed by:</strong> Kelvin (The Cashier Who Fell Hard)</div>
      </div>
      <h2 style="font-size: clamp(1.8rem, 3vw, 2.3rem); color: #6B4E71; margin-bottom: 1.5rem; font-weight: 700; line-height: 1.3;">${escapeHtml(prescription.title)}</h2>
      <p style="font-size: clamp(1.05rem, 2vw, 1.15rem); color: #5D4E6B; line-height: 1.9; font-family: 'Lato', sans-serif; font-weight: 400; margin-bottom: 2rem; text-align: justify;">${escapeHtml(prescription.content)}</p>
      <div class="diagnosis-box">
        <div class="diagnosis-label">DIAGNOSIS:</div>
        <div class="diagnosis-text">${escapeHtml(prescription.diagnosis)}</div>
        <div style="margin-top: 1rem;"></div>
        <div class="prescribed-label">PRESCRIBED:</div>
        <div class="prescribed-text">${escapeHtml(prescription.prescribed)}</div>
      </div>
      <div class="signature-area">
        <div>
          <div style="margin-bottom: 0.3rem; font-size: 0.75rem;">Signature:</div>
          <div class="signature-name">Kelvin ♥</div>
        </div>
        <div style="text-align: right; font-size: 0.8rem;">
          <div>Refills: Unlimited</div>
          <div style="font-style: italic; margin-top: 0.2rem;">Valid: Forever</div>
        </div>
      </div>
    `;
    prescriptionRoot.appendChild(card);

    // final message (only if last page)
    if (isLastPage) {
      const finalDiv = document.createElement('div');
      finalDiv.className = 'final-message';
      finalDiv.innerHTML = `
        <svg xmlns="http://www.w3.org/2000/svg" width="30" height="30" viewBox="0 0 24 24" fill="#C9A0B5" stroke="none" style="margin-bottom: 1rem;">
          <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
        </svg>
       <p style="font-size: 1.15rem; color: #6B4E71; line-height: 1.7; font-family: 'Lato', sans-serif; font-style: italic;">Helen, I'm just a cashier, and you're the pharmacist.<br />But lately... I find myself hoping that we could be something more than colleagues.<br />This is just the heart quietly telling you: I'd love to get to know you better, one day at a time.</p>
<p style="font-size: 1rem; color: #C9A0B5; margin-top: 1.5rem; font-family: 'Libre Baskerville', serif; font-weight: 700;">With growing affection,<br />Kelvin 💜</p>
      `;
      prescriptionRoot.appendChild(finalDiv);
    }

    // navigation buttons
    const navDiv = document.createElement('div');
    navDiv.className = 'nav-row';

    const prevBtn = document.createElement('button');
    prevBtn.className = 'btn-outline-nav';
    prevBtn.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg> Previous`;
    prevBtn.addEventListener('click', () => {
      if (currentPage > 1) {
        currentPage--;
        render();
      }
    });

    navDiv.appendChild(prevBtn);

    if (!isLastPage) {
      const nextBtn = document.createElement('button');
      nextBtn.className = 'btn-gradient';
      nextBtn.style.padding = '0.8rem 1.5rem';
      nextBtn.innerHTML = `Next Prescription <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>`;
      nextBtn.addEventListener('click', () => {
        if (currentPage < prescriptions.length) {
          currentPage++;
          render();
        }
      });
      navDiv.appendChild(nextBtn);
    } else {
      // last page: next is not shown, but we keep empty div for spacing? we can leave but no need
      // just keep the prev button only side? but design shows two buttons with blank maybe add dummy but better to keep.
      const emptyDiv = document.createElement('div');
      emptyDiv.style.width = '80px';
      navDiv.appendChild(emptyDiv);
    }

    prescriptionRoot.appendChild(navDiv);
    wrapperDiv.appendChild(prescriptionRoot);
    mainContainer.appendChild(wrapperDiv);
    rootEl.appendChild(mainContainer);
  }

  // simple escape to avoid XSS
  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c) {
      return c;
    });
  }

  // initial render
  render();
</script>
</body>
</html>
