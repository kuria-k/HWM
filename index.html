    * {

      padding: 0;

      min-height: 100vh;
      overflow-x: hidden;
      padding-top: 80px;
      padding-bottom: 2rem;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-15px); }
    }

    .floating-heart {
      position: fixed;
      pointer-events: none;
      color: rgba(201, 160, 181, 0.15);
      font-size: 20px;
      user-select: none;
      z-index: 0;
    }

    .container {
      max-width: 750px;
      margin: 0 auto;
      position: relative;
      z-index: 2;
      animation: fadeIn 0.8s ease-out;
      padding: 0 1rem;
    }

    .prescription-card {
      background: white;
      border-radius: 24px;
      padding: clamp(2rem, 5vw, 3rem);
      box-shadow: 0 20px 50px rgba(107, 78, 113, 0.12);
      border: 1px solid rgba(201, 160, 181, 0.3);
      transition: all 0.3s ease;
    }

    .rx-header {
      border-bottom: 2px solid #f0e0e8;
      padding-bottom: 1.5rem;
      margin-bottom: 2rem;
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      flex-wrap: wrap;
      gap: 1rem;
    }

    .rx-symbol {
      font-size: 3.2rem;
      color: #c49aad;
      font-weight: 700;
      font-family: 'Libre Baskerville', serif;
      letter-spacing: 2px;
    }

    .clinic-info {
      text-align: right;
      font-family: 'Lato', sans-serif;
      font-size: 0.8rem;
      color: #9b7e92;
      line-height: 1.5;
    }

    .patient-info {
      background: #fef8fa;
      padding: 1rem 1.2rem;
      border-radius: 16px;
      font-family: 'Lato', sans-serif;
      font-size: 0.85rem;
      color: #7a5f71;
      margin-bottom: 2rem;
      display: flex;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 0.5rem;
      border: 1px solid #f0e0e8;
    }

    .prescription-title {
      font-size: clamp(1.6rem, 4vw, 2.2rem);
      color: #5e3e52;
      margin-bottom: 1.5rem;
      font-weight: 700;
      line-height: 1.3;
      font-family: 'Libre Baskerville', serif;
    }

    .prescription-content {
      font-size: clamp(1rem, 2vw, 1.1rem);
      color: #5d4a5e;
      line-height: 1.9;
      font-family: 'Lato', sans-serif;
      margin-bottom: 2rem;
      text-align: justify;
    }

    .diagnosis-box {
      background: linear-gradient(135deg, #fbf5f8 0%, #f8f0f6 100%);
      border-radius: 20px;
      padding: 1.5rem;
      margin-bottom: 2rem;
      border: 1px solid #f0e0e8;
    }

    .label {
      font-family: 'Lato', sans-serif;
      font-size: 0.7rem;
      color: #b28aa0;
      font-weight: 800;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 0.4rem;
    }

    .value {
      font-family: 'Lato', sans-serif;
      font-size: 1rem;
      color: #6b4e71;
      font-style: italic;
      margin-bottom: 1rem;
    }

    .value:last-child {
      margin-bottom: 0;
    }

    .signature-area {
      border-top: 2px solid #f0e0e8;
      padding-top: 1.5rem;
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      flex-wrap: wrap;
      gap: 1rem;
      font-family: 'Lato', sans-serif;
      font-size: 0.8rem;
      color: #9b7e92;
    }

    .signature-name {
      font-family: 'Libre Baskerville', serif;
      font-style: italic;
      font-size: 1.2rem;
      color: #c49aad;
      margin-top: 0.3rem;
    }

    .nav-buttons {
      display: flex;
      justify-content: space-between;
      margin-top: 2rem;
      gap: 1rem;
    }

    .btn-prev, .btn-next {
      background: rgba(255, 255, 255, 0.92);
      color: #7a5f71;
      border: 1.5px solid rgba(196, 154, 173, 0.4);
      border-radius: 60px;
      padding: 0.8rem 1.8rem;
      font-size: 0.9rem;
      font-family: 'Lato', sans-serif;
      font-weight: 700;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      transition: all 0.25s ease;
      backdrop-filter: blur(4px);
    }

    .btn-next {
      background: linear-gradient(135deg, #d4b5c4 0%, #c49aad 100%);
      border: none;
      color: white;
      box-shadow: 0 4px 12px rgba(196, 154, 173, 0.3);
    }

      background: white;
      transform: translateX(-3px);
      border-color: #c49aad;
    }

    .btn-next:hover {
      transform: translateX(3px);
      box-shadow: 0 6px 18px rgba(196, 154, 173, 0.4);
    }

    .btn-prev:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      transform: none;
    }

    .final-message {
      background: rgba(255, 255, 255, 0.96);
      border-radius: 24px;
      padding: 2rem;
      margin-top: 2rem;
      text-align: center;
      box-shadow: 0 12px 30px rgba(196, 154, 173, 0.15);

      text-align: center;
      margin-bottom: 1.2rem;
      font-family: 'Lato', sans-serif;
      font-size: 0.75rem;
      color: #b28aa0;
      font-weight: 600;
      letter-spacing: 2px;

      body {
        padding-top: 70px;
        padding-bottom: 1rem;
      }
      .container {
        padding: 0 0.8rem;
      }
      .nav-buttons {
        flex-direction: column;
      }
      .btn-prev, .btn-next {
        justify-content: center;
      }
    }
  </style>
</head>

    return str.replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    });
  }

  function createFloatingHearts() {
    const existing = document.querySelectorAll('.floating-heart');
    existing.forEach(el => el.remove());
    for (let i = 0; i < 24; i++) {
      const heart = document.createElement('div');
      heart.className = 'floating-heart';
      heart.innerHTML = '♥';
      heart.style.left = Math.random() * 100 + '%';
      heart.style.top = Math.random() * 100 + '%';
      heart.style.fontSize = (12 + Math.random() * 24) + 'px';
      heart.style.opacity = 0.1 + Math.random() * 0.12;
      heart.style.animation = `float ${4 + Math.random() * 6}s ease-in-out infinite`;
      heart.style.animationDelay = Math.random() * 3 + 's';
      document.body.appendChild(heart);
    }
  }

  function render() {
    const container = document.getElementById('appContainer');
    if (!container) return;

    const t = translations[currentLang];
    const prescriptionsList = t.prescriptions;
    const isLast = (currentPrescriptionIdx === prescriptionsList.length - 1);
    const prescription = prescriptionsList[currentPrescriptionIdx];
    const stepNumber = currentPrescriptionIdx + 1;

    let html = `
      <div class="step-counter">
        ${t.stepPrefix} ${stepNumber} ${t.stepOf} ${prescriptionsList.length}
      </div>

      <div class="prescription-card">
        <div class="rx-header">
          <div class="rx-symbol">℞</div>
          <div class="clinic-info">
            ${t.clinicName}<br />
            <span style="font-size:0.7rem;">${t.clinicSub}</span>
          </div>
        </div>

        <div class="patient-info">
          <span><strong>${t.patient}</strong> ${t.patientName}</span>
          <span><strong>${t.prescribedBy}</strong> ${t.doctorName}</span>
        </div>

        <div class="prescription-title">${escapeHtml(prescription.title)}</div>
        <div class="prescription-content">${escapeHtml(prescription.content)}</div>

        <div class="diagnosis-box">
          <div class="label">${t.diagnosis}</div>
          <div class="value">${escapeHtml(prescription.diagnosis)}</div>
          <div class="label" style="margin-top: 1rem;">${t.prescribed}</div>
          <div class="value">${escapeHtml(prescription.prescribed)}</div>
        </div>

        <div class="signature-area">
          <div>
            <div style="font-size:0.7rem;">${t.signature}</div>
            <div class="signature-name">Kelvin ♥</div>
          </div>
          <div style="text-align:right;">
            <div>${t.refills}</div>
            <div style="font-style:italic; margin-top:0.2rem;">${t.valid}</div>
          </div>
        </div>
      </div>

      <div class="nav-buttons">
        <button class="btn-prev" id="prevBtn" ${currentPrescriptionIdx === 0 ? 'disabled' : ''}>
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
          ${t.prev}
        </button>
        ${!isLast ? `<button class="btn-next" id="nextBtn">${t.next} <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg></button>` : ''}
      </div>
    `;

    if (isLast) {
      html += `
        <div class="final-message">
          <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="#c49aad" stroke="none" style="margin-bottom: 1rem;">
            <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
          </svg>
          <p style="font-size: 1.05rem; color: #5e3e52; line-height: 1.7; font-family: 'Lato', sans-serif; font-style: italic;">
            ${t.finalMessage}
          </p>
          <p style="font-size: 1rem; color: #c49aad; margin-top: 1.5rem; font-family: 'Libre Baskerville', serif; font-weight: 700;">
            ${t.finalLove}<br />Kelvin 💜
          </p>
        </div>
      `;
    }

    container.innerHTML = html;

    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');

    if (prevBtn && currentPrescriptionIdx > 0) {
      prevBtn.addEventListener('click', () => {
        if (currentPrescriptionIdx > 0) {
          currentPrescriptionIdx--;
          render();
          window.scrollTo({ top: 0, behavior: 'smooth' });
        }
      });
    }

    if (nextBtn) {
      nextBtn.addEventListener('click', () => {
        if (currentPrescriptionIdx < prescriptionsList.length - 1) {
          currentPrescriptionIdx++;
          render();
          window.scrollTo({ top: 0, behavior: 'smooth' });
        }
      });
    }
  }

  function changeLanguage(lang) {
    currentLang = lang;
    const langNames = { en: 'English', sw: 'Kiswahili', ki: 'Gĩkũyũ', fr: 'Français' };
    document.getElementById('currentLanguageLabel').innerText = langNames[lang];
    currentPrescriptionIdx = 0;
    render();
  }

  // Navbar toggle for mobile
  document.getElementById('navbarToggle')?.addEventListener('click', () => {
    const menu = document.getElementById('navbarMenu');
    menu.classList.toggle('hidden');
  });

  // Language dropdown
  const dropdownBtn = document.getElementById('languageDropdownBtn');
  const dropdownMenu = document.getElementById('languageDropdownMenu');
  dropdownBtn?.addEventListener('click', () => {
    dropdownMenu.classList.toggle('hidden');
  });
  document.querySelectorAll('.lang-option').forEach(option => {
    option.addEventListener('click', (e) => {
      e.preventDefault();
      const lang = option.getAttribute('data-lang');
      if (lang) changeLanguage(lang);
      dropdownMenu.classList.add('hidden');
    });
  });
  document.addEventListener('click', (e) => {
    if (!dropdownBtn?.contains(e.target) && !dropdownMenu?.contains(e.target)) {
      dropdownMenu?.classList.add('hidden');
    }
  });

  // Navbar links
  document.querySelectorAll('.nav-link').forEach(link => {
    link.addEventListener('click', (e) => {
      e.preventDefault();
      const page = link.getAttribute('data-page');
      if (page === 'prescriptions') {
        currentPrescriptionIdx = 0;
        render();
        window.scrollTo({ top: 0, behavior: 'smooth' });
      } else {
        alert(`✨ "${page}" page coming soon! ✨\nThis is where your ${page} content will live.`);
      }
    });
  });

  createFloatingHearts();
  render();
  window.addEventListener('resize', () => createFloatingHearts());
</script>
</body>
</html>
